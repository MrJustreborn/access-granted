version: "3.9"

services:
  access-granted:
    image: ghcr.io/mrjustreborn/access-granted/access-granted:dev
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: access-granted
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - "./src/data:/app/data"