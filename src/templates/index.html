<!DOCTYPE html>
<html>
<head>
    <title>Access Management</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "MS Sans Serif", sans-serif;
            padding: 1em;
        }

        .window {
            width: 100%;
            max-width: 450px;
        }

        .window-body {
            display: flex;
            flex-direction: column;
            gap: 1em;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.25em;
        }

        label {
            font-weight: bold;
            font-size: 1rem;
        }

        input[type="number"],
        input[type="text"] {
            font-size: 1rem;
            padding: 0.25em;
        }

        input[type="number"] {
            width: 100px;
        }

        p {
            font-size: 1.1rem;
            margin: 0;
            word-break: break-all;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 0.5em;
            margin-top: 0.5em;
        }

        button.button {
            flex: 1;
            font-size: 1rem;
        }

        @media (max-width: 480px) {
            input[type="number"],
            input[type="text"] {
                font-size: 1.1rem;
            }

            button.button {
                font-size: 1.1rem;
                padding: 0.5em;
            }
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Client Access Management</div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <p><strong>Client IP:</strong><br>{{ client_ip }}</p>
            <p><strong>Subnet:</strong><br>{{ subnet }}</p>

            <form method="post">
                <div class="field-group">
                    <label for="duration">Duration (hours):</label>
                    <input type="number" id="duration" name="duration" value="{{ hours }}" min="1" max="{{ hours_max }}">
                </div>

                <div class="field-group">
                    <label for="comment">Comment:</label>
                    <input type="text" id="comment" name="comment" maxlength="48" placeholder="Optional comment">
                </div>

                <div class="buttons">
                    <button class="button" type="submit" name="target" value="client">Grant Client</button>
                    <button class="button" type="submit" name="target" value="subnet">Grant Subnet</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
