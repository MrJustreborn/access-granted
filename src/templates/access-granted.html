<!DOCTYPE html>
<html>
<head>
    <title>Access Granted</title>
    <link rel="stylesheet" href="https://unpkg.com/98.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #008080;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "MS Sans Serif", sans-serif;
            padding: 1em;
        }

        .window {
            width: 100%;
            max-width: 400px;
        }

        .window-body {
            display: flex;
            flex-direction: column;
            gap: 1em;
        }

        p {
            font-size: 1.1rem;
            margin: 0;
            word-break: break-all;
        }

        .message {
            font-weight: bold;
            color: green;
            font-size: 1.2rem;
            margin-bottom: 0.5em;
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            gap: 0.5em;
            margin-top: 0.5em;
        }

        button.button {
            font-size: 1rem;
            padding: 0.5em 1em;
        }

        @media (max-width: 480px) {
            .message {
                font-size: 1.3rem;
            }

            button.button {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-text">Access Granted</div>
            <div class="title-bar-controls">
                <button aria-label="Close"></button>
            </div>
        </div>
        <div class="window-body">
            <div class="message">✅ Access Granted!</div>
            <p><strong>Client IP:</strong><br>{{ client_ip }}</p>
            <p><strong>/64 Subnet:</strong><br>{{ subnet }}</p>
            <p><strong>Duration:</strong><br>{{ duration }} hours</p>
            {% if comment %}
            <p><strong>Comment:</strong><br>{{ comment }}</p>
            {% endif %}

            <form method="post" action="/granted">
                <div class="buttons">
                    <button class="button" type="submit" name="target" value="back">Back</button>
                    <button class="button" type="submit" name="target" value="next">Ok</button>
                </div>
            </form>            
        </div>
    </div>
</body>
</html>
